name: heymybro
description: "Oh My Bro — Flutter app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Locked stack — do not substitute
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  freezed_annotation: ^3.1.0
  json_annotation: 4.9.0
  drift: ^2.29.0
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.42
  shared_preferences: ^2.5.4
  go_router: ^17.1.0
  easy_localization: ^3.0.8
  easy_localization_loader: ^2.0.2
  dio: ^5.9.1
  flutter_dotenv: ^6.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  collection: ^1.19.1
  uuid: ^4.5.3
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0             # icon set (Lucide)

  # Add as project needs:
  # skeletonizer: ^2.1.3             # loading skeletons
  # google_sign_in: ^7.2.0           # auth (iOS)
  # credential_manager: ^2.0.8       # auth (Android)
  # share_plus: ^12.0.1              # share sheet
  # file_picker: ^10.3.10            # file picker
  # url_launcher: ^6.3.2             # open URLs
  # package_info_plus: ^9.0.1        # app version

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.7.1
  freezed: ^3.2.3
  json_serializable: 6.11.2
  drift_dev: ^2.29.0
  # flutter_launcher_icons: ^0.14.4  # icon generator

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/mascot/stickers/
    - assets/icon/
